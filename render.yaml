databases:
  - name: interview-db
    plan: basic-1gb

services:
  - type: web
    name: interview-schedular
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
